{{ define "main" }}
{{ $yearGroups := sort (.Pages.GroupByParam "year") "Key" "desc" }}
<div class="portfolio-page">
    <aside class="portfolio-nav">
        <div class="nav-timeline">
            <div class="nav-line"></div>
            {{ range $index, $group := $yearGroups }}
            <div class="nav-item {{ if eq $index 0 }}active{{ end }}" data-year="{{ $group.Key }}" role="button" tabindex="0">
                <span class="nav-dot"></span>
                <div class="nav-copy">
                    <span class="nav-year">{{ $group.Key }}</span>
                    <div class="nav-projects">
                        {{ range $index, $project := $group.Pages.ByDate.Reverse }}
                        <a href="{{ $project.RelPermalink }}" class="nav-project" data-project-year="{{ $project.Params.year }}" style="--index: {{ add $index 1 }}">{{ $project.Title }}</a>
                        {{ end }}
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
    </aside>

    <section class="portfolio-content">
        <div class="portfolio-background-display"></div>
    </section>

    <!-- Mobile Timeline Toggle Button -->
    <button class="mobile-timeline-toggle" aria-label="Open timeline navigation">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="toggle-text">Timeline</span>
    </button>

    <!-- Mobile Timeline Overlay -->
    <div class="mobile-timeline-overlay"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const portfolioItems = document.querySelectorAll('.portfolio-item');
    const navItems = document.querySelectorAll('.nav-item');
    const navProjectLinks = document.querySelectorAll('.nav-project');
    const yearSections = document.querySelectorAll('.portfolio-year-section');
    const portfolioPage = document.querySelector('.portfolio-page');
    const timelineToggle = document.querySelector('.mobile-timeline-toggle');
    const timelineOverlay = document.querySelector('.mobile-timeline-overlay');
    let activeYear = null;

    // Handle skeleton loader transitions
    portfolioItems.forEach(item => {
        const img = item.querySelector('.portfolio-image');
        
        if (img) {
            if (img.complete) {
                item.classList.remove('loading');
                item.classList.add('loaded');
            } else {
                img.addEventListener('load', function() {
                    setTimeout(() => {
                        item.classList.remove('loading');
                        item.classList.add('loaded');
                    }, 200);
                });
                
                img.addEventListener('error', function() {
                    item.classList.remove('loading');
                    item.classList.add('loaded');
                });
            }
        } else {
            setTimeout(() => {
                item.classList.remove('loading');
                item.classList.add('loaded');
            }, 300);
        }
    });

    const showYear = (year) => {
        if (activeYear === year) return;
        activeYear = year;

        yearSections.forEach(section => {
            section.classList.toggle('active', section.dataset.year === year);
        });

        navItems.forEach(item => {
            item.classList.toggle('active', item.dataset.year === year);
        });
    };

    const setTimelineState = (isOpen) => {
        if (!timelineToggle || !timelineOverlay || !portfolioPage) return;
        portfolioPage.classList.toggle('timeline-open', isOpen);
        timelineOverlay.classList.toggle('active', isOpen);
        timelineToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        document.body.style.overflow = isOpen ? 'hidden' : '';
    };

    const toggleTimeline = () => {
        const currentlyOpen = portfolioPage.classList.contains('timeline-open');
        setTimelineState(!currentlyOpen);
    };

    // Activate first year by default
    if (navItems.length && yearSections.length) {
        const defaultYear = navItems[0].dataset.year;
        showYear(defaultYear);
    }

    // Click handling
    navItems.forEach(item => {
        item.addEventListener('click', function() {
            showYear(this.dataset.year);
            if (portfolioPage.classList.contains('timeline-open')) {
                setTimelineState(false);
            }
        });

        item.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                showYear(this.dataset.year);
                if (portfolioPage.classList.contains('timeline-open')) {
                    setTimelineState(false);
                }
            }
        });
    });

    navProjectLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.stopPropagation();
            if (portfolioPage.classList.contains('timeline-open')) {
                setTimelineState(false);
            }
        });
    });

    if (timelineToggle) {
        timelineToggle.addEventListener('click', toggleTimeline);
    }

    if (timelineOverlay) {
        timelineOverlay.addEventListener('click', () => setTimelineState(false));
    }
});
</script>

<style>
/* Portfolio Layout */
.portfolio-page {
    position: relative;
    min-height: 100vh;
    background: #010101 url('https://res.cloudinary.com/dpdq565fr/image/upload/v1772896387/portfolio_page_bg_2_pcxy8m.jpg') center/cover fixed;
}

.portfolio-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    padding: 6rem clamp(1.5rem, 5vw, 4rem) 3rem;
    background: linear-gradient(180deg, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.9) 100%);
    border-right: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
    gap: 2rem;
    transform: translateX(-100%);
    transition: transform 0.35s ease;
    z-index: 999;
}

.portfolio-page.timeline-open .portfolio-nav {
    transform: translateX(0);
}

.nav-timeline {
    position: relative;
    flex: 1;
}

.nav-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 18px;
    width: 1px;
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 20%, rgba(255,255,255,0.4) 80%, rgba(255,255,255,0) 100%);
}

.nav-item {
    position: relative;
    display: flex;
    gap: 1.5rem;
    padding: 1.25rem 0 1.25rem 2.5rem;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    transition: color 0.3s ease, opacity 0.3s ease;
    cursor: pointer;
}

.nav-item:not(.active) {
    opacity: 0.4;
}

.nav-item:hover {
    color: #fff;
    opacity: 1;
}

.nav-item.active {
    color: #fff;
}

.nav-dot {
    position: absolute;
    left: 10px;
    top: calc(50% - 6px);
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.6);
    transition: transform 0.3s ease, background 0.3s ease;
}

.nav-item.active .nav-dot,
.nav-item:hover .nav-dot {
    transform: scale(1.3);
    background: #fff;
}

.nav-copy {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
}

.nav-year {
    font-size: clamp(2.4rem, 3vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.1em;
}

.nav-projects {
    display: none;
    flex-direction: column;
    gap: 0.55rem;
    margin-top: 0.6rem;
    padding-left: 0.2rem;
}

.nav-project {
    --index: 1;
    display: inline-flex;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    opacity: 0;
    transform: translateX(-12px);
    position: relative;
    transition: opacity 0.35s ease, transform 0.35s ease, color 0.3s ease;
}

.nav-project::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.25);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.3s ease, background 0.3s ease;
}

.nav-item.active .nav-projects {
    display: flex;
}

.nav-item.active .nav-project {
    color: rgba(255,255,255,0.85);
    opacity: 1;
    transform: translateX(0);
    transition-delay: calc(var(--index) * 70ms);
}

.nav-project:hover,
.nav-project:focus-visible {
    color: #fff;
}

.nav-project:hover::after,
.nav-project:focus-visible::after {
    transform: scaleX(1);
    background: #fff;
}

.nav-item:not(.active) .nav-project {
    transition-delay: 0ms;
}

.portfolio-content {
    padding: 0;
    position: relative;
    overflow: hidden;
    min-height: 100vh;
}

.portfolio-background-display {
    display: none;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    position: absolute;
    top: 0;
    left: 0;
}

.portfolio-item {
    position: relative;
    overflow: hidden;
    background: var(--bg-primary);
    cursor: pointer;
    border-radius: 8px;
    text-decoration: none;
    color: inherit;
}

.portfolio-image-container {
    position: relative;
    width: 100%;
    height: 400px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.portfolio-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease, filter 0.6s ease;
}

.portfolio-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.placeholder-content {
    text-align: center;
    color: var(--text-secondary);
}

.placeholder-content h3 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--text-primary);
}

.placeholder-content p {
    font-size: 0.9rem;
    opacity: 0.7;
}

.portfolio-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.portfolio-item:hover .portfolio-overlay {
    opacity: 1;
}

.portfolio-item:hover .portfolio-image {
    transform: scale(1.05);
    filter: brightness(0.8);
}

.overlay-content {
    text-align: center;
    color: white;
    padding: 2rem;
}

.overlay-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    line-height: 1.2;
}

.overlay-description {
    font-size: 0.95rem;
    line-height: 1.4;
    opacity: 0.9;
    max-width: 90%;
    margin: 0 auto;
    font-weight: 300;
}

.overlay-link {
    display: inline-block;
    background: transparent;
    color: white;
    padding: 0.5rem 1.5rem;
    border: 1px solid white;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: var(--transition);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.overlay-link:hover {
    background: white;
    color: var(--bg-primary);
}

/* Mobile Timeline Toggle Button */
.mobile-timeline-toggle {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 0.85rem 2.5rem;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    z-index: 1000;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
}

.mobile-timeline-toggle:hover {
    transform: translateX(-50%) translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}

.mobile-timeline-toggle svg {
    width: 24px;
    height: 24px;
    stroke-width: 2.2;
}

.mobile-timeline-toggle .toggle-text {
    font-size: 0.85rem;
}

/* Mobile Timeline Overlay */
.mobile-timeline-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 998;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

.mobile-timeline-overlay.active {
    opacity: 1;
    pointer-events: all;
}

/* Skeleton Loader Styles */
.skeleton-loader {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    opacity: 1;
    transition: opacity 0.3s ease;
    pointer-events: none;
}

.portfolio-item.loaded .skeleton-loader {
    opacity: 0;
    visibility: hidden;
}

.skeleton-image {
    width: 100%;
    height: 100%;
    background: linear-gradient(
        90deg,
        #1a1a1a 0%,
        #2a2a2a 20%,
        #2a2a2a 40%,
        #1a1a1a 100%
    );
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
    0% {
        background-position: -200% 0;
    }
    100% {
        background-position: 200% 0;
    }
}

.portfolio-item.loading .portfolio-image-container {
    opacity: 0;
    visibility: hidden;
}

.portfolio-item.loading .portfolio-overlay {
    opacity: 0 !important;
    visibility: hidden;
    pointer-events: none;
}

.portfolio-item.loading .overlay-content {
    display: none;
}

.portfolio-item.loaded .portfolio-image-container {
    opacity: 1;
    visibility: visible;
    animation: fadeIn 0.4s ease;
}

.portfolio-item.loaded .portfolio-overlay {
    visibility: visible;
}

.portfolio-item.loaded .overlay-content {
    display: block;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Responsive Design */
@media (max-width: 1024px) {
    .portfolio-page {
        background: #010101;
    }

    .portfolio-background-display {
        display: block;
        min-height: 60vh;
        background-image: url('https://res.cloudinary.com/dpdq565fr/image/upload/v1772896388/portfolio_page_bg_3_rygqoo.png');
        background-size: cover;
        background-position: right center;
        background-repeat: no-repeat;
    }
}

@media (max-width: 768px) {
    .portfolio-nav {
        width: 100%;
        max-width: none;
        padding: 5rem 1.5rem 2rem;
    }

    .nav-year {
        font-size: clamp(2rem, 5vw, 2.5rem);
    }

    .mobile-timeline-toggle {
        padding: 0.75rem 1.75rem;
        gap: 0.4rem;
    }
}

@media (max-width: 480px) {
    .mobile-timeline-toggle {
        padding: 0.75rem 1.75rem;
        gap: 0.4rem;
    }
}
</style>
{{ end }}
